<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://www.bocra.org.bw/themes/bocra/css/bootstrap.css">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; } body { font-family: 'Lato', sans-serif; margin: 0; padding: 0; font-size: 16px; }
    a { color: #0073ae; } header#header { background: rgba(255,255,255,0.9); padding: 15px 0; }
    .container { width: 1170px; max-width: 100%; margin: 0 auto; } .row { margin: 0 -15px; } .row:after { content: ""; clear: both; display: block; }
    .col-md-12, .col-md-8, .col-md-2 { float: left; padding: 0 15px; }
    .col-md-8 { width: 66.666667%; } .col-md-2 { width: 16.666667%; } .col-md-offset-2 { margin-left: 16.666667%; }
    #block-bocra-site-branding img { max-width: 200px; }
    #block-bocra-search-form-wide { background: rgba(198,30,83,0.4); padding: 8px 15px; }
    #block-bocra-search-form-wide input { background: transparent; border: none; color: white; width: 70%; }
    .telecoms-btn { background: rgba(198,30,83,0.6); color: white; padding: 8px 15px; }
    ul.nice-menu { list-style: none; margin: 0; padding: 0; display: flex; flex-wrap: wrap; }
    ul.nice-menu > li > a { display: block; padding: 30px 10px; color: #0073ae; font-weight: bold; }
    ul.nice-menu li ul { display: none; position: absolute; top: 100%; left: 0; background: rgba(198,30,83,0.95); width: 200px; }
    ul.nice-menu li:hover ul { display: block; } ul.nice-menu li ul li a { color: white; padding: 10px; display: block; }
    #carousel { background: url('https://www.bocra.org.bw/sites/default/files/media%20image/ipad-605439.jpg') center/cover no-repeat; min-height: 200px; padding: 80px 0 30px; }
    #carousel h1 { color: white; font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    #main-content { padding: 40px 0; } #main-content h1 { color: #0073ae; margin-bottom: 20px; }
    #main-content h2 { color: #0073ae; margin-top: 25px; } #main-content p { line-height: 1.6; margin-bottom: 15px; }
    form { max-width: 600px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; }
    .btn { display: inline-block; padding: 12px 25px; background: #0073ae; color: white; border: none; cursor: pointer; font-size: 16px; }
    .btn:hover { background: #005a8c; }
    footer { background: #06193e; color: white; padding: 40px 0; } footer a { color: white; } footer h3 { color: white; margin-bottom: 15px; }
    footer ul { list-style: none; padding: 0; }
  </style>
</head>
<body>
  <header id="header">
    <div class="container">
      <div class="row">
        <div class="col-md-3"><a href="index.html"><img src="https://www.bocra.org.bw/sites/default/files/logo_1.png" alt="BOCRA"></a></div>
        <div class="col-md-4" id="block-bocra-search-form-wide"><form><input type="search" placeholder="Search BOCRA"><input type="image" src="https://www.bocra.org.bw/themes/bocra/images/search.png"></form></div>
        <div class="col-md-3"><a href="#" class="telecoms-btn">Telecoms Statistics</a></div>
      </div>
      <div class="row">
        <div class="col-md-12">
          <ul class="nice-menu">
            <li><a href="index.html">About</a></li>
            <li><a href="mandate.html">Mandate</a></li>
            <li><a href="licensing.html">Licensing</a></li>
            <li><a href="complaints.html">Complaints</a></li>
            <li><a href="documents.html">Documents</a></li>
            <li><a href="tenders.html">Tenders</a></li>
          </ul>
        </div>
      </div>
    </div>
  </header>
  <div id="carousel"><div class="container"><h1>File A Complaint</h1></div></div>
  <div class="container">
    <div class="row">
      <div id="main-content" class="col-md-8 col-md-offset-2">
        <h1>File A Complaint</h1>
        <p>Please fill out the form below to file a complaint against a communications service provider.</p>
        <form>
          <div class="form-group">
            <label>Your Full Name *</label>
            <input type="text" required>
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" required>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel">
          </div>
          <div class="form-group">
            <label>Service Provider *</label>
            <select required>
              <option value="">Select Provider</option>
              <option value="btc">Botswana Telecommunications Corporation (BTC)</option>
              <option value="mascom">Mascom</option>
              <option value="orange">Orange Botswana</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Complaint Category *</label>
            <select required>
              <option value="">Select Category</option>
              <option value="billing">Billing Issues</option>
              <option value="service">Service Quality</option>
              <option value="customer">Customer Service</option>
              <option value="contract">Contract/terms</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label>Description of Complaint *</label>
            <textarea rows="6" required></textarea>
          </div>
          <button type="submit" class="btn">Submit Complaint</button>
        </form>
      </div>
    </div>
  </div>
  <footer>
    <div class="container">
      <div class="row">
        <div class="col-md-4"><h3>BOCRA</h3><p>T : +267 395 7755</p></div>
      </div>
    </div>
  </footer>
</body>
</html>
