<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BokaTurbo - Staff Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <style>
      :where([class^="ri-"])::before { content: "\f3c2"; }
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
          -webkit-appearance: none;
          margin: 0;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#0066CC",
              secondary: "#4A90E2",
            },
            borderRadius: {
              none: "0px",
              sm: "4px",
              DEFAULT: "8px",
              md: "12px",
              lg: "16px",
              xl: "20px",
              "2xl": "24px",
              "3xl": "32px",
              full: "9999px",
              button: "8px",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen flex flex-col">
      <header class="bg-white shadow-sm">
        <div
          class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between"
        >
          <div class="flex items-center">
            <span class="text-2xl font-['Pacifico'] text-primary"
              >BokaTurbo</span
            >
          </div>
          <button
            id="langToggle"
            class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 !rounded-button hover:bg-gray-50 flex items-center space-x-2 cursor-pointer"
          >
            <i
              class="ri-translate-2-line w-5 h-5 flex items-center justify-center"
            ></i>
            <span>English</span>
          </button>
        </div>
      </header>

      <main
        class="flex-1 flex items-center justify-center px-4 sm:px-6 lg:px-8 py-12"
      >
        <div class="max-w-md w-full">
          <div class="bg-white shadow-lg rounded-lg px-8 pt-6 pb-8 mb-4">
            <div class="text-center mb-8">
              <h2 class="text-2xl font-bold text-gray-900">Staff Login</h2>
              <p class="mt-2 text-sm text-gray-600">
                Please login to access the system
              </p>
            </div>
            <form id="loginForm" class="space-y-6">
              <div>
                <label class="block text-sm font-medium text-gray-700"
                  >Staff ID</label
                >
                <div class="mt-1 relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <i
                      class="ri-user-line text-gray-400 w-5 h-5 flex items-center justify-center"
                    ></i>
                  </div>
                  <input
                    type="text"
                    id="staffId"
                    required
                    class="pl-10 block w-full border-gray-300 !rounded-button shadow-sm focus:ring-primary focus:border-primary sm:text-sm"
                    placeholder="Enter your staff ID"
                  />
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-700"
                  >Password</label
                >
                <div class="mt-1 relative">
                  <div
                    class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                  >
                    <i
                      class="ri-lock-line text-gray-400 w-5 h-5 flex items-center justify-center"
                    ></i>
                  </div>
                  <input
                    type="password"
                    id="password"
                    required
                    class="pl-10 block w-full border-gray-300 !rounded-button shadow-sm focus:ring-primary focus:border-primary sm:text-sm"
                    placeholder="Enter your password"
                  />
                </div>
              </div>

              <div class="flex items-center justify-between">
                <div class="flex items-center">
                  <input
                    type="checkbox"
                    id="remember"
                    class="h-4 w-4 text-primary focus:ring-primary border-gray-300 !rounded"
                  />
                  <label for="remember" class="ml-2 block text-sm text-gray-900"
                    >Remember me</label
                  >
                </div>
                <div class="text-sm">
                  <a
                    href="#"
                    class="font-medium text-primary hover:text-primary/80"
                    >Forgot password?</a
                  >
                </div>
              </div>

              <div>
                <button
                  type="submit"
                  class="w-full flex justify-center py-2 px-4 border border-transparent !rounded-button shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary cursor-pointer"
                >
                  Sign in
                </button>
              </div>
            </form>
          </div>

          <div
            id="connectionStatus"
            class="flex items-center justify-center space-x-2 text-sm text-gray-600"
          >
            <i
              class="ri-wifi-line w-5 h-5 flex items-center justify-center"
            ></i>
            <span>Online</span>
          </div>
        </div>
      </main>

      <div
        id="toast"
        class="fixed bottom-4 right-4 transform transition-all duration-300 translate-y-full opacity-0"
      >
        <div
          class="bg-white border border-gray-100 shadow-lg !rounded-button p-4 flex items-center space-x-3"
        >
          <i
            class="ri-error-warning-line text-red-500 w-5 h-5 flex items-center justify-center"
          ></i>
          <span id="toastMessage" class="text-sm text-gray-700"></span>
        </div>
      </div>
    </div>

    <script>
      const loginForm = document.getElementById("loginForm");
      const toast = document.getElementById("toast");
      const toastMessage = document.getElementById("toastMessage");
      const connectionStatus = document.getElementById("connectionStatus");
      const langToggle = document.getElementById("langToggle");

      let isOnline = navigator.onLine;
      updateConnectionStatus();

      window.addEventListener("online", () => {
        isOnline = true;
        updateConnectionStatus();
      });

      window.addEventListener("offline", () => {
        isOnline = false;
        updateConnectionStatus();
      });

      function updateConnectionStatus() {
        const statusIcon = connectionStatus.querySelector("i");
        const statusText = connectionStatus.querySelector("span");

        if (isOnline) {
          statusIcon.className =
            "ri-wifi-line w-5 h-5 flex items-center justify-center text-green-500";
          statusText.textContent = "Online";
          statusText.className = "text-green-500";
        } else {
          statusIcon.className =
            "ri-wifi-off-line w-5 h-5 flex items-center justify-center text-red-500";
          statusText.textContent = "Offline";
          statusText.className = "text-red-500";
        }
      }

      function showToast(message, type = "error") {
        toastMessage.textContent = message;
        toast.classList.remove("translate-y-full", "opacity-0");
        toast.classList.add("translate-y-0", "opacity-100");
        setTimeout(() => {
          toast.classList.add("translate-y-full", "opacity-0");
          toast.classList.remove("translate-y-0", "opacity-100");
        }, 3000);
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const staffId = document.getElementById("staffId").value;
        const password = document.getElementById("password").value;
        const remember = document.getElementById("remember").checked;

        if (!staffId || !password) {
          showToast("Please fill in all fields");
          return;
        }

        try {
          if (!isOnline && !remember) {
            showToast("Cannot login offline without Remember Me enabled");
            return;
          }

          if (remember) {
            localStorage.setItem(
              "credentials",
              JSON.stringify({ staffId, password }),
            );
          }

          showToast("Login successful", "success");
          setTimeout(() => {
            window.location.href = "/dashboard";
          }, 1000);
        } catch (error) {
          showToast("Login failed. Please try again.");
        }
      });

      let currentLang = "en";
      langToggle.addEventListener("click", () => {
        currentLang = currentLang === "en" ? "sw" : "en";
        langToggle.querySelector("span").textContent =
          currentLang === "en" ? "English" : "Setswana";
      });

      if (localStorage.getItem("credentials")) {
        const { staffId, password } = JSON.parse(localStorage.getItem("credentials"));
        document.getElementById("staffId").value = staffId;
        document.getElementById("password").value = password;
        document.getElementById("remember").checked = true;
      }
    </script>
  </body>
</html>
