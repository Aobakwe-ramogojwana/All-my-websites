<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login/Signup - File Tracking System</title>
  <script src="https://cdn.tailwindcss.com/3.4.16"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#2563eb", secondary: "#475569" },
          borderRadius: {
            none: "0px",
            sm: "4px",
            DEFAULT: "8px",
            md: "12px",
            lg: "16px",
            xl: "20px",
            "2xl": "24px",
            "3xl": "32px",
            full: "9999px",
            button: "8px",
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" />
  <style>
    :where([class^="ri-"])::before { content: "\f3c2"; }
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('https://readdy.ai/api/search-image?query=modern%20office%20interior%20with%20glass%20walls%20and%20minimalist%20furniture%2C%20soft%20natural%20lighting%2C%20clean%20and%20professional%20environment%2C%20muted%20colors%2C%20subtle%20architectural%20details%2C%20perfect%20for%20a%20government%20ministry&width=1920&height=1080&seq=1&orientation=landscape');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen bg-gray-50/90">
  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-sm shadow-xl rounded-xl p-8">
      <div class="text-center mb-8">
        <!-- Logo Placeholder -->
        <div class="mb-4">
          <img src="https://th.bing.com/th/id/OIP.z2chX21AHLj0XXKCjkacNwHaHa?cb=iwc2&rs=1&pid=ImgDetMain" alt="Logo" class="mx-auto h-16">
        </div>
        <h1 class="font-['Pacifico'] text-3xl text-primary mb-2">Ministry of Justice and Correctional Services</h1>
        <div class="flex justify-center space-x-4">
          <button id="login-tab" class="text-gray-800 font-semibold px-4 py-2 rounded-button focus:outline-none active">
            Login
          </button>
          <button id="signup-tab" class="text-gray-800 font-semibold px-4 py-2 rounded-button focus:outline-none">
            Signup
          </button>
        </div>
      </div>

      <form id="login-form" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="login-email">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="ri-mail-line text-gray-400"></i>
            </div>
            <input type="email" id="login-email" name="email" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 focus:border-primary" placeholder="Enter your email">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="login-password">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="ri-lock-line text-gray-400"></i>
            </div>
            <input type="password" id="login-password" name="password" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 focus:border-primary" placeholder="Enter your password">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
            <label for="remember" class="ml-2 block text-sm text-gray-700">
              Remember me
            </label>
          </div>
          <a href="#" class="text-sm font-medium text-primary hover:text-primary/80">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="w-full bg-primary text-white py-2 px-4 rounded-button hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-colors whitespace-nowrap">
          Sign In
        </button>
      </form>

      <form id="signup-form" class="space-y-6 hidden">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="username">
            Username
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="ri-user-line text-gray-400"></i>
            </div>
            <input type="text" id="username" name="username" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 focus:border-primary" placeholder="Enter your username">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="signup-email">
            Email Address
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="ri-mail-line text-gray-400"></i>
            </div>
            <input type="email" id="signup-email" name="email" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 focus:border-primary" placeholder="Enter your email">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="signup-password">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="ri-lock-line text-gray-400"></i>
            </div>
            <input type="password" id="signup-password" name="password" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 focus:border-primary" placeholder="Enter your password">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="confirm-password">
            Confirm Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="ri-lock-line text-gray-400"></i>
            </div>
            <input type="password" id="confirm-password" name="confirm_password" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 focus:border-primary" placeholder="Confirm your password">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="role">
            Role
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i class="ri-user-settings-line text-gray-400"></i>
            </div>
            <select id="role" name="role" required class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-button text-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 focus:border-primary">
              <option value="">Select Role</option>
              <option value="admin">Admin</option>
              <option value="registry">Registry</option>
              <option value="user">User</option>
            </select>
          </div>
        </div>

        <button type="submit" class="w-full bg-primary text-white py-2 px-4 rounded-button hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-colors whitespace-nowrap">
          Sign Up
        </button>
      </form>

      <div class="mt-6 text-center">
        <p id="toggle-text" class="text-sm text-gray-600">
          Don't have an account?
          <a href="#" id="toggle-link" class="font-medium text-primary hover:text-primary/80">
            Sign up
          </a>
        </p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/11.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.7.1/firebase-firestore-compat.js"></script>

  <script>
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBl4iQtqEIYAkUltLpvTkVbT9jkfQKsuxo",
      authDomain: "mojcs-bc3bd.firebaseapp.com",
      projectId: "mojcs-bc3bd",
      storageBucket: "mojcs-bc3bd.firebasestorage.app",
      messagingSenderId: "214760361583",
      appId: "1:214760361583:web:c0ff2855875109a7c0479a",
      measurementId: "G-W7ZQDT0G0V"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.addEventListener("DOMContentLoaded", function () {
      const loginForm = document.getElementById("login-form");
      const signupForm = document.getElementById("signup-form");
      const loginTab = document.getElementById("login-tab");
      const signupTab = document.getElementById("signup-tab");
      const toggleText = document.getElementById("toggle-text");
      const toggleLink = document.getElementById("toggle-link");

      loginTab.addEventListener("click", function () {
        loginForm.classList.remove("hidden");
        signupForm.classList.add("hidden");
        loginTab.classList.add("active");
        signupTab.classList.remove("active");
        toggleText.innerHTML = "Don't have an account? <a href='#' id='toggle-link' class='font-medium text-primary hover:text-primary/80'>Sign up</a>";
      });

      signupTab.addEventListener("click", function () {
        signupForm.classList.remove("hidden");
        loginForm.classList.add("hidden");
        signupTab.classList.add("active");
        loginTab.classList.remove("active");
        toggleText.innerHTML = "Already have an account? <a href='#' id='toggle-link' class='font-medium text-primary hover:text-primary/80'>Sign in</a>";
      });

      toggleLink.addEventListener("click", function () {
        if (loginForm.classList.contains("hidden")) {
          loginTab.click();
        } else {
          signupTab.click();
        }
      });

      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;

        if (!email || !password) {
          const errorDiv = document.createElement("div");
          errorDiv.className =
            "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4";
          errorDiv.innerHTML = `
            <strong class="font-bold">Error!</strong>
            <span class="block sm:inline"> Please fill in all fields.</span>
          `;
          loginForm.appendChild(errorDiv);
          setTimeout(() => errorDiv.remove(), 3000);
          return;
        }

        auth.signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // Signed in
            const user = userCredential.user;
            console.log("User logged in:", user);
            window.location.href = "index.html";
          })
          .catch((error) => {
            const errorDiv = document.createElement("div");
            errorDiv.className =
              "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4";
            errorDiv.innerHTML = `
              <strong class="font-bold">Error!</strong>
              <span class="block sm:inline"> ${error.message}</span>
            `;
            loginForm.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 3000);
          });
      });

      signupForm.addEventListener("submit", function (e) {
        e.preventDefault();
        const username = document.getElementById("username").value;
        const email = document.getElementById("signup-email").value;
        const password = document.getElementById("signup-password").value;
        const confirmPassword = document.getElementById("confirm-password").value;
        const role = document.getElementById("role").value;

        if (!username || !email || !password || !confirmPassword || !role) {
          const errorDiv = document.createElement("div");
          errorDiv.className =
            "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4";
          errorDiv.innerHTML = `
            <strong class="font-bold">Error!</strong>
            <span class="block sm:inline"> Please fill in all fields.</span>
          `;
          signupForm.appendChild(errorDiv);
          setTimeout(() => errorDiv.remove(), 3000);
          return;
        }

        if (password !== confirmPassword) {
          const errorDiv = document.createElement("div");
          errorDiv.className =
            "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4";
          errorDiv.innerHTML = `
            <strong class="font-bold">Error!</strong>
            <span class="block sm:inline"> Passwords do not match.</span>
          `;
          signupForm.appendChild(errorDiv);
          setTimeout(() => errorDiv.remove(), 3000);
          return;
        }

        auth.createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // Signed up
            const user = userCredential.user;
            console.log("User registered:", user);

            // Save additional user info to Firestore
            db.collection("users").doc(user.uid).set({
              username: username,
              email: email,
              role: role // Save the selected role
            })
            .then(() => {
              console.log("User info saved to Firestore");
              window.location.href = "index.html";
            })
            .catch((error) => {
              console.error("Error saving user info:", error);
            });
          })
          .catch((error) => {
            const errorDiv = document.createElement("div");
            errorDiv.className =
              "bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mt-4";
            errorDiv.innerHTML = `
              <strong class="font-bold">Error!</strong>
              <span class="block sm:inline"> ${error.message}</span>
            `;
            signupForm.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 3000);
          });
      });

      // Forgot password workflow
      const forgotLink = document.querySelector('a[href="#"]:contains("Forgot password?")') || document.querySelector('.forgot-password-link');
      if (forgotLink) {
        forgotLink.addEventListener('click', function (e) {
          e.preventDefault();
          showForgotPasswordModal();
        });
      }
      function showForgotPasswordModal() {
        let modal = document.getElementById('forgotPasswordModal');
        if (!modal) {
          modal = document.createElement('div');
          modal.id = 'forgotPasswordModal';
          modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
          modal.innerHTML = `<div class='bg-white rounded-lg shadow-xl w-full max-w-md mx-4'><div class='p-4 border-b border-gray-200 flex items-center justify-between'><h3 class='font-semibold text-gray-800'>Reset Password</h3><button class='text-gray-500 hover:text-gray-700' id='closeForgotPasswordModal'><i class='ri-close-line ri-lg'></i></button></div><div class='p-6'><input type='email' id='forgotEmail' class='w-full px-3 py-2 border border-gray-300 rounded-button mb-4' placeholder='Enter your email'><button id='sendResetEmail' class='w-full bg-primary text-white px-4 py-2 rounded-button'>Send Reset Link</button><div id='forgotResult' class='mt-4'></div></div></div>`;
          document.body.appendChild(modal);
        } else {
          modal.classList.remove('hidden');
        }
        document.getElementById('closeForgotPasswordModal').onclick = () => modal.classList.add('hidden');
        document.getElementById('sendResetEmail').onclick = function () {
          const email = document.getElementById('forgotEmail').value.trim();
          const resultDiv = document.getElementById('forgotResult');
          resultDiv.innerHTML = '';
          if (!email) {
            resultDiv.innerHTML = '<span class="text-red-500">Please enter your email.</span>';
            return;
          }
          auth.sendPasswordResetEmail(email)
            .then(() => {
              resultDiv.innerHTML = '<span class="text-green-600">A password reset link has been sent to your email address. Please check your inbox.</span>';
            })
            .catch((error) => {
              resultDiv.innerHTML = `<span class='text-red-500'>${error.message}</span>`;
            });
        };
      }
    });
  </script>
</body>
</html>
